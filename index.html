<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The DOMC — The Discipline of Mental Coherence</title>
<meta name="description" content="The DOMC — The Discipline of Mental Coherence.">
<meta name="theme-color" content="#FBFCFC">
<meta property="og:title" content="The DOMC — The Discipline of Mental Coherence">
<meta property="og:type" content="website">
<meta property="og:url" content="https://thedomc.org/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap">
<style>
  *,*::before,*::after{ box-sizing:border-box; }
  :root{
    --bg:#4A4A4A;            /* true neutral grey */
    --bg-2:#343434;          /* deeper neutral grey */
    --card:#FCFEFE;          /* near-white card face */
    --teal:#176570;          /* calm turquoise-blue — the brand voice */
    --teal-deep:#103F47;     /* deep teal for the wordmark */
    --muted:#4F7077;         /* readable teal-grey for meta */
    --faint:#88A2A6;
  }
  html,body{ margin:0; padding:0; }
  body{
    min-height:100vh; min-height:100svh;
    background:
      linear-gradient(105deg,
        #565656 0%,
        #4C4C4C 22%,
        #3A3A3A 46%,
        #2F2F2F 64%,
        #3E3E3E 82%,
        #525252 100%);
    color:var(--teal-deep);
    font-family:'Inter', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    display:grid; place-items:center;
    overflow-x:hidden;
  }

  .stage{
    display:grid; place-items:center; text-align:center;
    padding:clamp(2rem,6vw,4.5rem) 1.5rem 2rem;
  }

  /* beveled card */
  .content{
    display:flex; flex-direction:column; align-items:center;
    padding:clamp(2.6rem,6vw,4.2rem) clamp(2rem,7vw,5rem);
    background:linear-gradient(180deg, #FFFFFF 0%, var(--card) 100%);
    border-radius:18px;
    border:1px solid rgba(16,63,71,.08);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.9),
      inset 0 -1px 2px rgba(16,63,71,.06),
      0 1px 1px rgba(0,0,0,.10),
      0 30px 60px -20px rgba(0,0,0,.55),
      0 8px 22px -10px rgba(0,0,0,.35);
  }

  .wordmark{
    font-family:'Cormorant Garamond', Georgia, serif;
    font-weight:500; font-style:italic;
    font-size:clamp(2.6rem,8vw,4.7rem);
    line-height:1; letter-spacing:.01em;
    white-space:nowrap;
    margin:0; padding-right:.12em;
    color:var(--teal-deep);
  }

  .full{
    font-family:'Cormorant Garamond', Georgia, serif;
    font-weight:500; font-style:italic;
    font-size:clamp(1.25rem,3.4vw,1.7rem);
    letter-spacing:.005em; text-transform:none;
    color:var(--teal);
    margin:clamp(1.1rem,3vw,1.5rem) 0 0;
  }

  .soon{
    display:inline-flex; align-items:center; gap:.6rem;
    white-space:nowrap;
    font-family:'Inter', sans-serif; font-weight:500;
    font-size:.82rem; letter-spacing:.26em; text-transform:uppercase;
    color:var(--muted);
    margin:clamp(2rem,5vw,2.7rem) 0 0; padding-left:.26em;
  }
  .soon .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--teal);
    animation:pulse 4s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:.3; } 50%{ opacity:.9; } }

  @media (prefers-reduced-motion:reduce){ .soon .dot{ animation:none; } }
</style>
</head>
<body>
  <main class="stage">
    <div class="content">
      <h1 class="wordmark">The DoMC</h1>
      <p class="full">The Discipline of Mental Coherence</p>
      <p class="soon"><span class="dot" aria-hidden="true"></span>Site coming soon</p>
    </div>
  </main>
</body>
</html>
